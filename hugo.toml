baseURL = 'https://luoxilin-20.github.io/'
languageCode = 'zh-cn'
title = '列巴出颅꒷🥖. 𖦹˙'
theme = "PaperMod"

[params]
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  ShowToc = true
  TocOpen = true

  # 主题切换按钮
  disableThemeToggle = false

  # 首页 profile 模式（需要禁用 homeInfoParams 才能显示主题切换按钮）
  [params.profileMode]
    enabled = true
    title = "列巴出颅꒷🥖. 𖦹˙"
    subtitle = "欢迎来到我的博客"
    imageUrl = ""
    imageTitle = ""
    imageWidth = 120
    imageHeight = 120

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/LuoXilin-20"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[menu]
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/"
    weight = 10
  [[menu.main]]
    identifier = "archives"
    name = "Archive"
    url = "/archives/"
    weight = 20
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 30
  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 40
