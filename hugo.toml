baseURL = 'https://luoxilin-20.github.io/'
languageCode = 'zh-cn'
title = '列巴出颅꒷🥖. 𖦹˙'
theme = "PaperMod"

[params]
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  ShowToc = true
  TocOpen = true

  [params.homeInfoParams]
    Title = "列巴出颅꒷🥖. 𖦹˙"
    Content = "欢迎来到我的博客"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/LuoXilin-20"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[menu]
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/"
    weight = 10
